# flyway-cicd-pipeline.yml
# ===========================
# Flyway Community CI/CD Pipeline with Classification Validation
# Effective Test Data Management Demo - Data Ceili 2026
# ===========================
#
# This pipeline:
# 1. Build stage: Creates DB from scratch, runs all migrations, validates classifications
# 2. Test stage: Deploys to Test environment
# 3. Prod stage: Deploys to Production (with manual approval)

name: Flyway-CICD-$(Build.BuildId)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - migrations/*

pool:
  name: Default  # Use your self-hosted agent pool name

variables:
  WORKING_DIRECTORY: $(System.DefaultWorkingDirectory)

# ============================================
# BUILD STAGE
# ============================================
stages:
  - stage: Build
    displayName: 'Build & Validate'
    jobs:
      - job: BuildAndValidate
        displayName: 'Build from Scratch + Validate Classifications'
        steps:
          # Step 1: Ensure Flyway is available
          - task: PowerShell@2
            displayName: 'Verify Flyway Installation'
            inputs:
              targetType: 'inline'
              script: |
                $flywayCmd = Get-Command flyway -ErrorAction SilentlyContinue
                if ($flywayCmd) {
                    Write-Host "Flyway found: $($flywayCmd.Source)"
                    & flyway --version
                } else {
                    Write-Host "##vso[task.logissue type=error]Flyway not found in PATH. Run Setup-Demo.ps1 first."
                    exit 1
                }

          # Step 2: Create/Clean Build database
          - task: PowerShell@2
            displayName: 'Create Build Database'
            inputs:
              targetType: 'inline'
              script: |
                Import-Module dbatools -Force
                
                $dbName = "Northwind_Build"
                $sqlInstance = "localhost"
                
                # Drop if exists
                $existing = Get-DbaDatabase -SqlInstance $sqlInstance -Database $dbName -ErrorAction SilentlyContinue
                if ($existing) {
                    Write-Host "Dropping existing $dbName..."
                    Remove-DbaDatabase -SqlInstance $sqlInstance -Database $dbName -Confirm:$false
                }
                
                # Create fresh empty database (Flyway will build schema via migrations)
                Write-Host "Creating $dbName..."
                New-DbaDatabase -SqlInstance $sqlInstance -Name $dbName | Out-Null

                Write-Host "Build database ready!"

          # Step 3: Run Flyway migrate
          - task: PowerShell@2
            displayName: 'Flyway Migrate (Build)'
            inputs:
              targetType: 'inline'
              script: |
                # Ensure build runs from a clean database state every time
                & flyway `
                    clean `
                    -environment="build" `
                    -configFiles="$(WORKING_DIRECTORY)\flyway.toml" `
                    -locations="filesystem:$(WORKING_DIRECTORY)\migrations"

                & flyway `
                    info migrate info `
                    -environment="build" `
                    -configFiles="$(WORKING_DIRECTORY)\flyway.toml" `
                    -locations="filesystem:$(WORKING_DIRECTORY)\migrations" `
                    -baselineOnMigrate=true

          # Step 4: Validate Classifications & Masking Coverage (TWO CRITICAL CHECKS!)
          # NOTE: Classifications are now applied by Flyway migration V002__Add_Sensitivity_Classifications.sql
          # This step validates that:
          #   TEST 1: No unclassified columns (catches new columns without classification)
          #   TEST 2: All sensitive classified columns have masking rules (catches incomplete masking config)
          - task: PowerShell@2
            displayName: 'Validate Classifications & Masking'
            inputs:
              targetType: 'inline'
              script: |
                & "$(WORKING_DIRECTORY)\scripts\Validate-Classifications.ps1" `
                    -SqlInstance "localhost" `
                    -Database "Northwind_Build" `
                    -MaskingConfigPath "$(WORKING_DIRECTORY)\masking\masking-config.json" `
                    -FailOnIssues

          # Step 7: Publish artifacts for deployment stages
          - task: CopyFiles@2
            displayName: 'Copy Artifacts'
            inputs:
              SourceFolder: '$(WORKING_DIRECTORY)'
              Contents: |
                migrations/**/*
                flyway.toml
                scripts/**/*
                masking/**/*
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifacts'
            inputs:
              ArtifactName: 'flyway-artifacts'
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'

# ============================================
# TEST STAGE
# ============================================
  - stage: Test
    displayName: 'Deploy to Test'
    dependsOn: Build
    jobs:
      - job: DeployToTest
        displayName: 'Deploy Migrations to Test'
        steps:
          - task: DownloadBuildArtifacts@0
            displayName: 'Download Artifacts'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'flyway-artifacts'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: PowerShell@2
            displayName: 'Flyway Migrate (Test)'
            inputs:
              targetType: 'inline'
              script: |
                $artifactPath = "$(System.ArtifactsDirectory)\flyway-artifacts"
                
                & flyway `
                    info migrate info `
                    -environment="test" `
                    -configFiles="$artifactPath\flyway.toml" `
                    -locations="filesystem:$artifactPath\migrations" `
                    -baselineOnMigrate=true

# ============================================
# PROD STAGE (with approval gate)
# ============================================
  - stage: Prod
    displayName: 'Deploy to Production'
    dependsOn: Test
    jobs:
      - job: Approval
        displayName: 'Manual Approval'
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: 'Approve Production Deployment'
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              instructions: |
                Review the migration scripts and classification validation results.
                Approve to deploy to Production.

      - job: DeployToProd
        displayName: 'Deploy Migrations to Prod'
        dependsOn: Approval
        steps:
          - task: DownloadBuildArtifacts@0
            displayName: 'Download Artifacts'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'flyway-artifacts'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: PowerShell@2
            displayName: 'Flyway Migrate (Prod)'
            inputs:
              targetType: 'inline'
              script: |
                $artifactPath = "$(System.ArtifactsDirectory)\flyway-artifacts"
                
                & flyway `
                    info migrate info `
                    -environment="prod" `
                    -configFiles="$artifactPath\flyway.toml" `
                    -locations="filesystem:$artifactPath\migrations" `
                    -baselineOnMigrate=true
                
                Write-Host ""
                Write-Host "=============================================" -ForegroundColor Green
                Write-Host "  Production deployment complete!" -ForegroundColor Green
                Write-Host "=============================================" -ForegroundColor Green

          # Classifications are applied by Flyway migrations (V002)
